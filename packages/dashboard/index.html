    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is DevScope?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "DevScope is an open-source monitoring and upskilling platform for Claude Code developer sessions. It captures session lifecycle events, analyzes AI-assisted workflows, surfaces effective patterns, and helps teams improve their AI engineering skills over time."
          }
        },
        {
          "@type": "Question",
          "name": "How does the DevScope Claude Code plugin work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The DevScope plugin installs as Claude Code hooks — lightweight async Bash scripts that fire on session events such as prompts, tool calls, and session start/end. All hooks are non-blocking with zero impact on developer workflow. Install with: claude plugin marketplace add DowLucas/devscope-plugin"
          }
        },
        {
          "@type": "Question",
          "name": "What data does DevScope collect?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "DevScope offers three privacy modes. In 'private' mode it collects only metadata (timestamps, tool names, counts). In 'standard' mode (default) it includes prompt text and session context. In 'open' mode it includes full prompts and responses. You control the privacy level in your config."
          }
        },
        {
          "@type": "Question",
          "name": "Can I self-host DevScope?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. DevScope is fully open source and designed for self-hosting. Deploy with Docker Compose in minutes. Your data stays entirely on your infrastructure. A managed cloud version is also available at devscope.sh."
          }
        },
        {
          "@type": "Question",
          "name": "Is DevScope free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. DevScope is free and open source. The plugin is MIT licensed. The cloud version at devscope.sh is free during beta. Self-hosting is always free with no usage limits."
          }
        }
      ]
    }
    </script>
