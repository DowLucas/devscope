services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: devscope
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devscope}
      POSTGRES_DB: devscope
    volumes:
      - gc-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devscope"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: production
    environment:
      PORT: "6767"
      DATABASE_URL: postgres://devscope:${POSTGRES_PASSWORD:-devscope}@postgres:5432/devscope
      STALE_SESSION_TIMEOUT_MINUTES: "${STALE_SESSION_TIMEOUT_MINUTES:-5}"
      GC_CORS_ORIGIN: ${GC_CORS_ORIGIN:-}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-devscope-dev-secret-change-in-production}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://backend:6767}
      DEVSCOPE_ADMIN_EMAIL: ${DEVSCOPE_ADMIN_EMAIL:-admin@devscope.local}
      DEVSCOPE_ADMIN_PASSWORD: ${DEVSCOPE_ADMIN_PASSWORD:-changeme123!}
      DEVSCOPE_ADMIN_NAME: ${DEVSCOPE_ADMIN_NAME:-Admin}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AI_DAILY_TOKEN_BUDGET: ${AI_DAILY_TOKEN_BUDGET:-1000000}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    build:
      context: .
      dockerfile: docker/caddy.Dockerfile
      target: production
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  gc-pgdata:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
